<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barangay Portal - Login</title>
    <style>
        :root {
            --primary-color: #0056b3;
            /* 1. CHANGE YOUR BACKGROUND HERE */
            /* You can use an online image URL, or a local file like 'bg.jpg' if it's in the same folder */
            --bg-image: url('https://images.unsplash.com/photo-1579546929518-9e396f3cc809'); 
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* Applies the background image styling */
            background-image: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), var(--bg-image);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            padding: 20px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px); /* Creates a modern frosted glass effect */
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .logo-placeholder {
            width: 80px;
            height: 80px;
            background-color: var(--primary-color);
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.8rem;
            font-weight: bold;
            margin: 0 auto 1.5rem auto;
            box-shadow: 0 4px 10px rgba(0,86,179,0.3);
        }

        h2 {
            color: #212529;
            margin-bottom: 0.5rem;
            font-size: 1.6rem;
        }

        p {
            color: #6c757d;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .input-group {
            text-align: left;
            margin-bottom: 1.25rem;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            color: #495057;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .input-group input, .input-group select {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #ced4da;
            border-radius: 6px;
            font-size: 1rem;
            transition: all 0.2s ease;
            outline: none;
        }

        .input-group input:focus, .input-group select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(0, 86, 179, 0.15);
        }

        .actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
        }

        .actions a {
            color: var(--primary-color);
            text-decoration: none;
        }

        .actions a:hover {
            text-decoration: underline;
        }

        .btn-login {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .btn-login:hover {
            background-color: #004085;
        }

        .back-home {
            margin-top: 1.5rem;
            display: inline-block;
            font-size: 0.85rem;
            color: #6c757d;
            text-decoration: none;
        }

        .back-home:hover {
            color: var(--primary-color);
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-placeholder">B</div>
        
        <h2>Welcome Back</h2>
        <p>Sign in to your Barangay Portal account</p>

        <form id="loginForm">
            
            <div class="input-group">
                <label for="role">Login As</label>
                <select id="role" required>
                    <option value="resident">Resident / Citizen</option>
                    <option value="admin">Barangay Official (Admin)</option>
                </select>
            </div>

            <div class="input-group">
                <label for="username">Username or Email</label>
                <input type="text" id="username" placeholder="Enter your username" required>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>

            <div class="actions">
                <label style="display: flex; align-items: center; gap: 5px; color: #495057; cursor: pointer;">
                    <input type="checkbox"> Remember me
                </label>
                <a href="#">Forgot Password?</a>
            </div>

            <button type="submit" class="btn-login">Sign In</button>
        </form>

        <a href="index.html" class="back-home">← Back to Main Portal</a>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            // Prevents the page from reloading automatically
            event.preventDefault(); 
            
            // Get values entered by the user
            const selectedRole = document.getElementById('role').value;
            const inputUser = document.getElementById('username').value;
            const inputPass = document.getElementById('password').value;

            // CONFIGURATION: Set your custom username and password variables here
            const ADMIN_USERNAME = "admin123";
            const ADMIN_PASSWORD = "barangaypassword2026";

            if (selectedRole === 'admin') {
                // If trying to access admin dashboard, evaluate security credentials
                if (inputUser === ADMIN_USERNAME && inputPass === ADMIN_PASSWORD) {
                    alert("Admin login successful!");
                    window.location.href = 'admin.html';
                } else {
                    alert("Incorrect Admin Username or Password! Access Denied.");
                }
            } else {
                // Resident login bypasses restriction for testing purposes
                alert("Resident login successful!");
                window.location.href = 'index.html';
            }
        });
    </script>

</body>
</html>
